apiVersion: apps/v1
kind: Deployment
metadata:
  name: apuestas-service
  labels:
    app: apuestas-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apuestas-service
  template:
    metadata:
      labels:
        app: apuestas-service
    spec:
      containers:
        - name: apuestas-service
          image: 533267092848.dkr.ecr.us-east-1.amazonaws.com/apuestas-service:latest
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: casino-config

            - secretRef:
                name: casino-secrets
          livenessProbe:
            httpGet:
              path: /livez
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
